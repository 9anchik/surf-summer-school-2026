# ─── POST /auth/otp/send ────────────────────────────────────
otpSend:
  post:
    tags: [Auth]
    operationId: otpSend
    summary: Отправить OTP-код на номер телефона
    description: |
      Инициирует процесс входа/регистрации. Генерирует одноразовый код (OTP)
      и отправляет его по SMS. Rate-limit: не более 1 запроса в 30–60 сек на
      номер, не более 5 в час (NFR-19).
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [phone]
            properties:
              phone:
                type: string
                pattern: '^\+7\d{10}$'
                example: "+79161234567"
                description: Номер телефона в международном формате (+7, 10 цифр)
    responses:
      "200":
        description: Код отправлен успешно
        content:
          application/json:
            schema:
              type: object
              required: [expires_in, retry_after]
              properties:
                expires_in:
                  type: integer
                  description: TTL кода в секундах
                  example: 300
                retry_after:
                  type: integer
                  description: Через сколько секунд можно запросить повторно
                  example: 60
      "400":
        description: Неверный формат номера телефона
        content:
          application/json:
            schema:
              $ref: "../components/schemas.yaml#/ErrorResponse"
            example:
              error: "invalid_phone"
              message: "Неверный формат номера телефона. Используйте +7XXXXXXXXXX"
      "429":
        description: Превышен лимит запросов (NFR-19)
        headers:
          Retry-After:
            schema:
              type: integer
            description: Секунд до повторной попытки
        content:
          application/json:
            schema:
              $ref: "../components/schemas.yaml#/ErrorResponse"
            example:
              error: "rate_limited"
              message: "Слишком много попыток. Повторите через 60 секунд"
              details:
                retry_after: 60
      "500":
        $ref: "../components/responses.yaml#/InternalServerError"

# ─── POST /auth/otp/verify ──────────────────────────────────
otpVerify:
  post:
    tags: [Auth]
    operationId: otpVerify
    summary: Подтвердить OTP-код и получить токены
    description: |
      Проверяет введённый код. При успехе возвращает пару JWT: access (~15 мин)
      и refresh (~30 дней). Оба хранятся в Keychain/Keystore (NFR-18).
      Лимит попыток ввода: ≤5 до временной блокировки (NFR-19).
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [phone, code]
            properties:
              phone:
                type: string
                pattern: '^\+7\d{10}$'
                example: "+79161234567"
              code:
                type: string
                pattern: '^\d{4,6}$'
                example: "123456"
                description: OTP-код из SMS (4 или 6 цифр)
    responses:
      "200":
        description: Успешная авторизация
        content:
          application/json:
            schema:
              type: object
              required: [access_token, refresh_token, expires_in, client]
              properties:
                access_token:
                  type: string
                  description: JWT access-токен (~15 мин)
                refresh_token:
                  type: string
                  description: JWT refresh-токен (~30 дней)
                expires_in:
                  type: integer
                  description: Время жизни access-токена в секундах
                  example: 900
                token_type:
                  type: string
                  enum: [Bearer]
                  example: Bearer
                client:
                  $ref: "../components/schemas.yaml#/Client"
      "400":
        description: Неверный код или истёк TTL
        content:
          application/json:
            schema:
              $ref: "../components/schemas.yaml#/ErrorResponse"
            example:
              error: "invalid_code"
              message: "Неверный или истёкший код"
              details:
                attempts_remaining: 3
      "429":
        description: Превышен лимит попыток ввода (NFR-19)
        content:
          application/json:
            schema:
              $ref: "../components/schemas.yaml#/ErrorResponse"
            example:
              error: "rate_limited"
              message: "Слишком много попыток. Повторите через 600 секунд"
              details:
                retry_after: 600

# ─── POST /auth/refresh ─────────────────────────────────────
refresh:
  post:
    tags: [Auth]
    operationId: refreshToken
    summary: Обновить access-токен по refresh-токену
    description: |
      Используется в 401-flow (NFR-18). Клиент отправляет refresh-токен,
      получает новую пару access + refresh.
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [refresh_token]
            properties:
              refresh_token:
                type: string
                description: Refresh-токен из предыдущей авторизации
    responses:
      "200":
        description: Токены обновлены
        content:
          application/json:
            schema:
              type: object
              required: [access_token, refresh_token, expires_in]
              properties:
                access_token:
                  type: string
                refresh_token:
                  type: string
                expires_in:
                  type: integer
                  example: 900
                token_type:
                  type: string
                  enum: [Bearer]
      "401":
        description: Refresh-токен невалиден или истёк — требуется перелогин
        content:
          application/json:
            schema:
              $ref: "../components/schemas.yaml#/ErrorResponse"
            example:
              error: "invalid_refresh_token"
              message: "Сессия истекла. Войдите заново"

# ─── POST /auth/logout ──────────────────────────────────────
logout:
  post:
    tags: [Auth]
    operationId: logout
    summary: Выйти из аккаунта
    description: |
      Отзыв текущего refresh-токена на сервере. Клиент очищает Keychain/Keystore.
    responses:
      "204":
        description: Успешный выход
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
